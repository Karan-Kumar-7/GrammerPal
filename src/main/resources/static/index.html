<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GrammerPal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>GrammerPal</h1>
    <textarea id="inputText" placeholder="Enter your sentence here..."></textarea>
    <br><br>
    <button onclick="correctText()">Correct Grammer</button>
    <div class="result">
    <h3>Corrected Text</h3>
    <p id="corrected"></p>
    <h3>Explanation</h3>
    <p id="explanation"></p>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
